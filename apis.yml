aid: unify-ai
name: Unify
description: >
  Unify is an LLM routing and model gateway platform that enables developers to
  access 100+ large language model providers through a single unified REST API
  and API key. The platform dynamically routes each prompt to the optimal model
  based on user-defined preferences across quality, speed, and cost dimensions,
  using live runtime benchmarks updated continuously across providers including
  OpenAI, Anthropic, Mistral, Together AI, Replicate, Groq, DeepSeek, and many
  more. Unify provides an observability dashboard for comparing model and provider
  performance, automatic fallback routing, and caching capabilities to reduce
  redundant API calls. Developers can benchmark models on their own prompts using
  standardized datasets and switch providers without rewriting application code
  using the unified model@provider endpoint syntax.
