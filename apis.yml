apis:
  - name: Unify Universal API
    description: >
      The Unify Universal API provides a single REST endpoint with Bearer token
      authentication for routing LLM requests to 100+ model providers including
      OpenAI, Anthropic, Mistral, Together AI, Replicate, Groq, DeepSeek, Vertex
      AI, and more. Requests use the model@provider syntax for explicit routing
      or optimizer strings for automatic routing based on quality, cost, and speed
      preferences. The API is OpenAI-compatible, supports streaming, caching,
      fallbacks, and structured logging.
